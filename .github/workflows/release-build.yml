name: Release Build

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          standalone: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Validate release version
        id: version
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $tagName = "${{ github.event.release.tag_name }}"

          if ($tagName -ne "v$packageVersion") {
            throw "Release tag $tagName does not match package.json version v$packageVersion."
          }

          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT

      - name: Build Windows release artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run build -- --win --publish never

      - name: Validate release artifacts
        shell: pwsh
        run: |
          $installerPath = "release/${{ steps.version.outputs.package_version }}/OpenListScraper-Windows-${{ steps.version.outputs.package_version }}-Setup.exe"
          $blockmapPath = "release/${{ steps.version.outputs.package_version }}/OpenListScraper-Windows-${{ steps.version.outputs.package_version }}-Setup.exe.blockmap"
          $latestYmlPath = "release/${{ steps.version.outputs.package_version }}/latest.yml"
          $unpackedExePath = "release/${{ steps.version.outputs.package_version }}/win-unpacked/OpenListScraper.exe"
          $appAsarPath = "release/${{ steps.version.outputs.package_version }}/win-unpacked/resources/app.asar"
          $appProcess = $null

          function Stop-AppProcess {
            param(
              [System.Diagnostics.Process]$ProcessToStop
            )

            if ($null -ne $ProcessToStop -and -not $ProcessToStop.HasExited) {
              Stop-Process -Id $ProcessToStop.Id -Force
              Start-Sleep -Seconds 2
            }
          }

          try {
            foreach ($requiredPath in @($installerPath, $blockmapPath, $latestYmlPath, $unpackedExePath, $appAsarPath)) {
              if (-not (Test-Path $requiredPath)) {
                throw "Required release artifact not found at $requiredPath."
              }
            }

            $requiredPackagedEntries = @(
              'node_modules/better-sqlite3'
              'node_modules/better-sqlite3/build/Release/better_sqlite3.node'
              'node_modules/bindings'
              'node_modules/file-uri-to-path'
              'node_modules/electron-updater'
              'node_modules/builder-util-runtime'
              'node_modules/js-yaml'
              'node_modules/lazy-val'
              'node_modules/semver'
            )
            $asarEntries = & .\node_modules\.bin\asar.cmd l $appAsarPath |
              ForEach-Object { $_.TrimStart('\') -replace '\\', '/' }
            $missingPackagedEntries = @(
              $requiredPackagedEntries | Where-Object { $_ -notin $asarEntries }
            )

            if ($missingPackagedEntries.Length -gt 0) {
              throw @(
                "Packaged runtime dependencies are missing from ${appAsarPath}:"
                $missingPackagedEntries | ForEach-Object { "- $_" }
              ) -join "`n"
            }

            $appProcess = Start-Process -FilePath $unpackedExePath -PassThru

            $deadline = (Get-Date).AddSeconds(12)
            while ((Get-Date) -lt $deadline) {
              Start-Sleep -Seconds 1

              if ($appProcess.HasExited) {
                throw "Unpacked app exited during smoke test with exit code $($appProcess.ExitCode)."
              }
            }
          }
          finally {
            Stop-AppProcess -ProcessToStop $appProcess
          }

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: true
          files: |
            release/${{ steps.version.outputs.package_version }}/OpenListScraper-Windows-${{ steps.version.outputs.package_version }}-Setup.exe
            release/${{ steps.version.outputs.package_version }}/OpenListScraper-Windows-${{ steps.version.outputs.package_version }}-Setup.exe.blockmap
            release/${{ steps.version.outputs.package_version }}/latest.yml
